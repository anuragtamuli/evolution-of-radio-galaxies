<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Probing the Evolution of Radio Galaxies</title>
    
  <link rel="icon" type="image/png" href="./galaxy-cluster.png">

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: white;

      display: grid;
      place-items: center;

      background-image:
        linear-gradient(rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.62)),
        url("./hubble-udf2.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    main {
      width: min(720px, 100%);
      padding: 2rem 1rem;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1rem;
      opacity: 0.85;
    }

    .links {
      margin-top: 2rem;
      display: grid;
      gap: 1rem;
    }

    a.card {
      display: block;
      padding: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    a.card:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .desc {
      margin-top: 0.25rem;
      font-size: 0.9rem;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <main>
    <h1>Evolution of Radio Galaxies</h1>

    <p>
      Notes and discussions from my '26 summer project at PRL Thaltej under Dr. Veeresh Singh on the evolution of radio galaxies.
    </p>

    <section class="links">
      <a class="card" href="./docs/notes.pdf">
        <div class="title">Notes</div>
        <div class="desc">Main record of notes for the project.</div>
      </a>

      <a class="card" href="./docs/discussions.pdf">
        <div class="title">Informal Record</div>
        <div class="desc">Discussions, doubts etc in an informal manner.</div>
      </a>
    </section>
  </main>
</body>
</html>
